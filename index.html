<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lista de Supermercado Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .modal-enter { animation: fadeIn 0.2s ease-out forwards; }
        .modal-leave { animation: fadeOut 0.2s ease-in forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes fadeOut { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(0.95); } }
        /* Quita las flechas de los inputs numericos para ahorrar espacio en movil */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center sm:p-4 bg-gray-100">

    <div class="w-full h-[100dvh] sm:h-[90vh] sm:max-w-md bg-white sm:rounded-3xl shadow-xl overflow-hidden flex flex-col relative">
        
        <!-- Header Compacto -->
        <div class="bg-blue-600 text-white p-3 sm:p-4 sm:rounded-b-3xl shadow-md z-10 flex flex-col gap-2 shrink-0">
            <div class="flex justify-between items-center">
                <!-- Titulo adaptado a movil (text-base) -->
                <h1 class="text-base sm:text-xl font-bold flex items-center gap-1.5 whitespace-nowrap truncate">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 sm:h-7 sm:w-7 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                    <span class="truncate">Mi Supermercado</span>
                </h1>
                
                <!-- Botones Globales mas pequeños en movil -->
                <div class="flex gap-1 shrink-0">
                    <button type="button" onclick="abrirModalSync()" class="text-blue-100 hover:text-white transition-colors bg-blue-700/50 p-1.5 sm:p-2 rounded-lg" title="Sincronizar/Compartir">
                        <svg class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
                    </button>
                    <button type="button" onclick="abrirModalCategorias()" class="text-blue-100 hover:text-white transition-colors bg-blue-700/50 p-1.5 sm:p-2 rounded-lg" title="Categor&iacute;as">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 sm:h-5 sm:w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z" />
                        </svg>
                    </button>
                    <button type="button" onclick="abrirModalResetGlobal()" class="text-blue-100 hover:text-white transition-colors bg-blue-700/50 p-1.5 sm:p-2 rounded-lg" title="Reiniciar">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 sm:h-5 sm:w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                    </button>
                    <button type="button" onclick="abrirModalVaciar()" class="text-blue-100 hover:text-white transition-colors bg-blue-700/50 p-1.5 sm:p-2 rounded-lg" title="Vaciar">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 sm:h-5 sm:w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Totalizador ultra compacto -->
            <div class="bg-blue-800/40 rounded-xl p-2 flex justify-between items-center">
                <p class="text-blue-100 text-xs font-medium">Total Confirmado:</p>
                <span class="text-xl sm:text-2xl font-bold text-green-300" id="totalDisplay">$ 0,00</span>
            </div>
        </div>

        <!-- Add Item Form -->
        <div class="p-3 border-b border-gray-100 bg-gray-50 z-0 shrink-0 shadow-sm">
            <form id="addForm" class="flex flex-col gap-2">
                <!-- Fila 1: Nombre y Categoría con anchos porcentuales para no desbordar -->
                <div class="flex gap-2 w-full">
                    <input type="text" id="nombreInput" required placeholder="Ej. Leche..." class="w-[60%] sm:flex-1 px-3 py-1.5 text-xs sm:text-sm rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none">
                    <select id="categoriaInput" class="w-[40%] sm:w-[120px] px-1 py-1.5 text-xs sm:text-sm rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none bg-white cursor-pointer truncate">
                        <!-- Llenado dinámico -->
                    </select>
                </div>
                <!-- Fila 2: Cantidad, Precio y Botón -->
                <div class="flex gap-2 items-center">
                    <input type="number" id="cantidadInput" required min="0.01" step="0.01" placeholder="Cant." class="w-16 px-2 py-1.5 text-xs sm:text-sm rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none text-center">
                    <div class="relative w-24 flex-1">
                        <span class="absolute left-2 top-1.5 text-gray-500 text-xs sm:text-sm">$</span>
                        <input type="number" id="precioInput" min="0" step="0.01" placeholder="Precio" class="w-full pl-6 pr-2 py-1.5 text-xs sm:text-sm rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-4 py-1.5 rounded-lg text-xs sm:text-sm transition-colors shadow-sm active:scale-[0.98]">
                        A&ntilde;adir
                    </button>
                </div>
            </form>
        </div>

        <!-- Items List Container -->
        <div class="flex-1 overflow-y-auto p-3 bg-white pb-20">
            <div id="emptyState" class="hidden h-full flex flex-col items-center justify-center text-gray-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mb-2 opacity-30" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                </svg>
                <p class="text-sm">Tu lista est&aacute; vac&iacute;a.</p>
            </div>
            <div id="itemList" class="space-y-4">
                <!-- Artículos insertados por JS -->
            </div>
        </div>
    </div>

    <!-- Modal: Vaciar Lista -->
    <div id="confirmModal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-5 w-full max-w-sm shadow-2xl modal-enter">
            <h3 class="text-lg font-bold text-center text-gray-900 mb-2">&iquest;Vaciar toda la lista?</h3>
            <div class="flex gap-2">
                <button onclick="cerrarModal('confirmModal')" class="flex-1 px-3 py-2 rounded-xl border text-sm font-semibold">Cancelar</button>
                <button onclick="vaciarListaConfirmada()" class="flex-1 px-3 py-2 rounded-xl bg-red-600 text-white text-sm font-semibold">S&iacute;, vaciar</button>
            </div>
        </div>
    </div>

    <!-- Modal: Reinicio Global -->
    <div id="resetModal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-5 w-full max-w-sm shadow-2xl modal-enter">
            <h3 class="text-lg font-bold text-center text-gray-900 mb-2">&iquest;Reiniciar compras?</h3>
            <div class="flex gap-2">
                <button onclick="cerrarModal('resetModal')" class="flex-1 px-3 py-2 rounded-xl border text-sm font-semibold">Cancelar</button>
                <button onclick="resetGlobalConfirmado()" class="flex-1 px-3 py-2 rounded-xl bg-blue-600 text-white text-sm font-semibold">S&iacute;, reiniciar</button>
            </div>
        </div>
    </div>

    <!-- Modal: Gestor de Categorías -->
    <div id="categoriasModal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-4 w-full max-w-md shadow-2xl flex flex-col h-[70vh] modal-enter">
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-lg font-bold text-gray-900">Categor&iacute;as</h3>
                <button onclick="cerrarModal('categoriasModal')" class="p-1"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
            </div>
            <div class="flex gap-2 mb-3 pb-3 border-b items-center">
                <input type="color" id="nuevaCatColor" value="#3b82f6" class="w-8 h-8 p-0 rounded border cursor-pointer shrink-0">
                <input type="text" id="nuevaCatInput" placeholder="Nueva..." class="flex-1 px-2 py-1.5 text-sm rounded-lg border outline-none">
                <button onclick="agregarCategoria()" class="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-sm font-semibold">A&ntilde;adir</button>
            </div>
            <div class="flex-1 overflow-y-auto pr-1 space-y-2" id="listaCategoriasModal"></div>
        </div>
    </div>

    <!-- Modal Auxiliar: Editar Categoría -->
    <div id="editCatModal" class="hidden fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-5 w-full max-w-sm shadow-2xl modal-enter">
            <h3 class="text-lg font-bold mb-3">Editar Categor&iacute;a</h3>
            <input type="hidden" id="editCatOldName">
            <div class="flex gap-2 mb-4">
                <input type="color" id="editCatColor" class="w-10 h-10 p-0 rounded border shrink-0">
                <input type="text" id="editCatInput" class="flex-1 px-3 py-2 text-sm rounded-lg border outline-none">
            </div>
            <div class="flex gap-2">
                <button onclick="cerrarModal('editCatModal')" class="flex-1 px-3 py-2 rounded-xl border text-sm font-semibold">Cancelar</button>
                <button onclick="guardarEdicionCategoria()" class="flex-1 px-3 py-2 rounded-xl bg-blue-600 text-white text-sm font-semibold">Guardar</button>
            </div>
        </div>
    </div>

    <!-- Modal: Compartir / Sincronizar -->
    <div id="syncModal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-5 w-full max-w-sm shadow-2xl modal-enter flex flex-col gap-4">
            <div class="flex justify-between items-center">
                <h3 class="text-lg font-bold text-gray-900">Transferir Lista</h3>
                <button onclick="cerrarModal('syncModal')" class="p-1"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
            </div>
            
            <div class="bg-blue-50 p-3 rounded-xl border border-blue-100">
                <p class="text-xs text-blue-800 mb-2 font-medium">1. Copia este c&oacute;digo y env&iacute;alo (ej. por WhatsApp):</p>
                <div class="flex gap-2">
                    <input type="text" id="exportData" readonly class="flex-1 px-2 py-1.5 text-xs rounded border bg-white text-gray-500 outline-none">
                    <button onclick="copiarCodigoSync()" class="bg-blue-600 text-white px-3 py-1.5 rounded text-xs font-semibold shadow-sm active:scale-95 transition-transform">Copiar</button>
                </div>
            </div>

            <div class="bg-gray-50 p-3 rounded-xl border border-gray-200">
                <p class="text-xs text-gray-700 mb-2 font-medium">2. O pega un c&oacute;digo recibido aqu&iacute;:</p>
                <textarea id="importData" rows="2" placeholder="Pega el c&oacute;digo aqu&iacute;..." class="w-full px-2 py-1.5 text-xs rounded border bg-white outline-none mb-2 resize-none"></textarea>
                <button onclick="importarCodigoSync()" class="w-full bg-green-600 text-white py-2 rounded-xl text-sm font-semibold shadow-sm active:scale-95 transition-transform">Reemplazar lista con este c&oacute;digo</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'supermercado_data';
        const CAT_STORAGE_KEY = 'supermercado_categorias';
        const ESTADO_CAT_KEY = 'supermercado_estado_cat';
        
        let articulos = [];
        let estadoCategorias = {};
        let categorias = [
            { nombre: 'Almacén', color: '#eab308' },
            { nombre: 'Verdulería', color: '#22c55e' },
            { nombre: 'Carnicería', color: '#ef4444' },
            { nombre: 'Lácteos', color: '#3b82f6' },
            { nombre: 'Limpieza', color: '#06b6d4' },
            { nombre: 'Otros', color: '#8b5cf6' }
        ];
        const CATEGORIA_POR_DEFECTO = { nombre: 'Sin Categoría', color: '#9ca3af' };

        const formateadorMoneda = new Intl.NumberFormat('es-AR', {
            minimumFractionDigits: 2, maximumFractionDigits: 2
        });

        function inicializar() {
            const catGuardadas = localStorage.getItem(CAT_STORAGE_KEY);
            if (catGuardadas) categorias = JSON.parse(catGuardadas);
            else guardarCategorias();
            
            const estadosGuardados = localStorage.getItem(ESTADO_CAT_KEY);
            if (estadosGuardados) estadoCategorias = JSON.parse(estadosGuardados);

            actualizarSelectCategorias();

            const dataGuardada = localStorage.getItem(STORAGE_KEY);
            if (dataGuardada) articulos = JSON.parse(dataGuardada);
            
            renderizarLista();
        }

        function guardarDatos() { localStorage.setItem(STORAGE_KEY, JSON.stringify(articulos)); recalcularTotal(); }
        function guardarCategorias() { localStorage.setItem(CAT_STORAGE_KEY, JSON.stringify(categorias)); }
        function guardarEstadoCategorias() { localStorage.setItem(ESTADO_CAT_KEY, JSON.stringify(estadoCategorias)); }

        function toggleCategoria(nombreCat) {
            // Si no existe, es true (expandido) por defecto. Lo invertimos.
            estadoCategorias[nombreCat] = !(estadoCategorias[nombreCat] !== false); 
            guardarEstadoCategorias();
            renderizarLista();
        }

        function actualizarSelectCategorias() {
            const select = document.getElementById('categoriaInput');
            select.innerHTML = '';
            const todas = [...categorias];
            if(!todas.find(c => c.nombre === CATEGORIA_POR_DEFECTO.nombre)) todas.push(CATEGORIA_POR_DEFECTO);
            todas.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat.nombre; option.textContent = cat.nombre;
                select.appendChild(option);
            });
        }

        function abrirModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function cerrarModal(id) { document.getElementById(id).classList.add('hidden'); }
        function abrirModalCategorias() { renderizarListaCategoriasModal(); abrirModal('categoriasModal'); }
        function abrirModalVaciar() { if(articulos.length > 0) abrirModal('confirmModal'); }
        function abrirModalResetGlobal() { if(articulos.length > 0) abrirModal('resetModal'); }
        
        function abrirModalSync() {
            // Empaquetar todo (artículos, categorías y estados)
            const payload = { a: articulos, c: categorias, e: estadoCategorias };
            // Convertir a texto, luego a Base64 para que sea un bloque de texto seguro para WhatsApp
            const codigo = btoa(encodeURIComponent(JSON.stringify(payload)));
            document.getElementById('exportData').value = codigo;
            document.getElementById('importData').value = '';
            abrirModal('syncModal');
        }

        function copiarCodigoSync() {
            const input = document.getElementById('exportData');
            input.select();
            input.setSelectionRange(0, 99999); // Para móviles
            document.execCommand('copy');
            
            // Efecto visual temporal en el botón
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = '¡Copiado!';
            btn.classList.replace('bg-blue-600', 'bg-green-600');
            setTimeout(() => {
                btn.textContent = originalText;
                btn.classList.replace('bg-green-600', 'bg-blue-600');
            }, 2000);
        }

        function importarCodigoSync() {
            const codigo = document.getElementById('importData').value.trim();
            if(!codigo) return;
            
            try {
                // Decodificar el texto base64 a un objeto
                const payload = JSON.parse(decodeURIComponent(atob(codigo)));
                if(payload.a && payload.c) {
                    articulos = payload.a;
                    categorias = payload.c;
                    if(payload.e) estadoCategorias = payload.e;
                    
                    guardarDatos();
                    guardarCategorias();
                    guardarEstadoCategorias();
                    actualizarSelectCategorias();
                    renderizarLista();
                    cerrarModal('syncModal');
                } else {
                    console.error("Formato de código inválido");
                }
            } catch (error) {
                console.error("Error al importar datos", error);
            }
        }

        function agregarCategoria() {
            const input = document.getElementById('nuevaCatInput');
            const colorInput = document.getElementById('nuevaCatColor');
            const nuevaCat = input.value.trim();
            if (nuevaCat && !categorias.find(c => c.nombre === nuevaCat) && nuevaCat !== CATEGORIA_POR_DEFECTO.nombre) {
                categorias.push({ nombre: nuevaCat, color: colorInput.value });
                guardarCategorias(); actualizarSelectCategorias(); renderizarListaCategoriasModal(); input.value = '';
            }
        }

        function abrirModalEdicionCategoria(nombre, color) {
            document.getElementById('editCatOldName').value = nombre;
            document.getElementById('editCatInput').value = nombre;
            document.getElementById('editCatColor').value = color;
            abrirModal('editCatModal');
        }

        function guardarEdicionCategoria() {
            const oldName = document.getElementById('editCatOldName').value;
            const newName = document.getElementById('editCatInput').value.trim();
            const newColor = document.getElementById('editCatColor').value;
            if (newName && newName !== CATEGORIA_POR_DEFECTO.nombre) {
                const index = categorias.findIndex(c => c.nombre === oldName);
                if (index > -1) {
                    categorias[index].nombre = newName; categorias[index].color = newColor;
                    if (newName !== oldName) articulos.forEach(a => { if (a.categoria === oldName) a.categoria = newName; });
                    guardarCategorias(); guardarDatos(); actualizarSelectCategorias(); renderizarListaCategoriasModal(); renderizarLista();
                }
            }
            cerrarModal('editCatModal');
        }

        function eliminarCategoria(nombreCat) {
            categorias = categorias.filter(c => c.nombre !== nombreCat);
            articulos.forEach(a => { if (a.categoria === nombreCat) a.categoria = CATEGORIA_POR_DEFECTO.nombre; });
            guardarCategorias(); guardarDatos(); actualizarSelectCategorias(); renderizarListaCategoriasModal(); renderizarLista();
        }

        function renderizarListaCategoriasModal() {
            const list = document.getElementById('listaCategoriasModal');
            list.innerHTML = categorias.map(cat => `
                <div class="flex justify-between items-center p-2 bg-gray-50 rounded-lg border border-gray-200">
                    <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full" style="background-color: ${cat.color}"></div><span class="font-medium text-sm">${cat.nombre}</span></div>
                    <div class="flex gap-1">
                        <button onclick="abrirModalEdicionCategoria('${cat.nombre}', '${cat.color}')" class="p-1 text-blue-600 hover:bg-blue-100 rounded"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg></button>
                        <button onclick="eliminarCategoria('${cat.nombre}')" class="p-1 text-red-600 hover:bg-red-100 rounded"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('addForm').addEventListener('submit', e => {
            e.preventDefault();
            const precioVal = parseFloat(document.getElementById('precioInput').value.replace(',','.'));
            articulos.push({
                id: Date.now().toString(),
                nombre: document.getElementById('nombreInput').value.trim(),
                categoria: document.getElementById('categoriaInput').value,
                cantidad: parseFloat(document.getElementById('cantidadInput').value.replace(',', '.')),
                precioUnitario: isNaN(precioVal) ? 0 : precioVal,
                isComprado: false
            });
            document.getElementById('nombreInput').value = ''; 
            document.getElementById('cantidadInput').value = ''; 
            document.getElementById('precioInput').value = '';
            document.getElementById('nombreInput').focus();
            guardarDatos(); renderizarLista();
        });

        function recalcularTotal() {
            const total = articulos.filter(a => a.isComprado).reduce((sum, a) => sum + (a.cantidad * a.precioUnitario), 0);
            document.getElementById('totalDisplay').textContent = `$ ${formateadorMoneda.format(total)}`;
        }

        function toggleComprado(id) {
            const art = articulos.find(a => a.id === id);
            if (art) { art.isComprado = !art.isComprado; guardarDatos(); renderizarLista(); }
        }

        function actualizarValores(id, campo, valor) {
            const art = articulos.find(a => a.id === id);
            if (art) {
                const numVal = parseFloat(valor.replace(',', '.'));
                if (!isNaN(numVal) && numVal >= 0) {
                    if (campo === 'cantidad') art.cantidad = numVal;
                    if (campo === 'precio') art.precioUnitario = numVal;
                    guardarDatos(); renderizarLista();
                }
            }
        }

        function eliminarArticulo(id) { articulos = articulos.filter(a => a.id !== id); guardarDatos(); renderizarLista(); }
        function vaciarListaConfirmada() { articulos = []; guardarDatos(); renderizarLista(); cerrarModal('confirmModal'); }
        function resetGlobalConfirmado() { articulos.forEach(a => { a.isComprado = false; a.precioUnitario = 0; }); guardarDatos(); renderizarLista(); cerrarModal('resetModal'); }
        function resetearCategoria(cat) { articulos.forEach(a => { if(a.categoria === cat) { a.isComprado = false; a.precioUnitario = 0; }}); guardarDatos(); renderizarLista(); }

        function hexToRgba(hex, alpha) {
            let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function renderizarLista() {
            const itemList = document.getElementById('itemList');
            document.getElementById('emptyState').classList.toggle('hidden', articulos.length > 0);
            itemList.innerHTML = '';

            const grupos = articulos.reduce((acc, a) => {
                if (!acc[a.categoria]) acc[a.categoria] = [];
                acc[a.categoria].push(a); return acc;
            }, {});

            for (const categoria in grupos) {
                const arts = grupos[categoria];
                const subtotalCat = arts.filter(a => a.isComprado).reduce((sum, a) => sum + (a.cantidad * a.precioUnitario), 0);
                const catObj = categorias.find(c => c.nombre === categoria) || CATEGORIA_POR_DEFECTO;
                const isExpanded = estadoCategorias[categoria] !== false; // true por defecto
                
                const grupoDiv = document.createElement('div');
                grupoDiv.className = 'rounded-xl p-2.5 sm:p-3 shadow-sm mb-3 transition-all';
                grupoDiv.style.backgroundColor = hexToRgba(catObj.color, 0.08);
                grupoDiv.style.border = `1px solid ${hexToRgba(catObj.color, 0.3)}`;
                grupoDiv.style.borderLeft = `4px solid ${catObj.color}`;
                
                // Cabecera Categoría (Ahora es clickeable)
                grupoDiv.innerHTML = `
                    <div class="flex justify-between items-center cursor-pointer pb-1.5" onclick="toggleCategoria('${categoria}')" style="${isExpanded ? `border-bottom: 1px solid ${hexToRgba(catObj.color, 0.2)}` : ''}">
                        <div class="flex items-center gap-1.5">
                            <button class="text-gray-500 hover:text-gray-900 transition-transform duration-200 ${isExpanded ? 'rotate-180' : ''}">
                                <svg class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                            </button>
                            <h2 class="font-bold text-gray-800 flex items-center gap-1.5 text-xs sm:text-sm select-none">
                                <span class="w-2.5 h-2.5 rounded-full shadow-sm" style="background-color: ${catObj.color}"></span>${categoria}
                            </h2>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="event.stopPropagation(); resetearCategoria('${categoria}')" class="text-gray-500 hover:text-gray-900" title="Reiniciar">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                            </button>
                            <span class="text-xs sm:text-sm font-bold ${subtotalCat > 0 ? 'text-green-600' : 'text-gray-500'}">$ ${formateadorMoneda.format(subtotalCat)}</span>
                        </div>
                    </div>
                `;
                
                const ulWrapper = document.createElement('div');
                ulWrapper.className = `mt-2 ${isExpanded ? 'block' : 'hidden'}`;

                const ul = document.createElement('ul');
                ul.className = 'space-y-1.5';

                arts.forEach(art => {
                    const subtotal = art.cantidad * art.precioUnitario;
                    const bgClass = art.isComprado ? 'bg-green-50/70 border-green-200' : 'bg-white border-gray-200';
                    const textClass = art.isComprado ? 'text-gray-400 line-through' : 'text-gray-800';

                    const li = document.createElement('li');
                    li.className = `flex flex-col gap-1.5 p-2 border rounded-lg ${bgClass}`;
                    
                    // Fila 1: Check y Nombre / Fila 2: Tacho, Inputs y Subtotal
                    li.innerHTML = `
                        <!-- Fila 1: Checkbox y Nombre -->
                        <div class="flex items-center gap-2 w-full">
                            <input type="checkbox" ${art.isComprado ? 'checked' : ''} onchange="toggleComprado('${art.id}')"
                                class="w-5 h-5 sm:w-6 sm:h-6 text-blue-600 rounded focus:ring-blue-500 cursor-pointer accent-blue-600 shrink-0">
                            <p class="text-sm font-semibold truncate ${textClass} flex-1">${art.nombre}</p>
                        </div>
                        
                        <!-- Fila 2: Controles Inferiores en una línea -->
                        <div class="flex items-center justify-between gap-1 w-full pl-7 sm:pl-8">
                            <!-- Boton Tacho (Izquierda) -->
                            <button onclick="eliminarArticulo('${art.id}')" class="text-red-400 hover:text-red-600 p-1 rounded-md hover:bg-red-50 shrink-0">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                            </button>
                            
                            <!-- Cantidad y Precio (Centro) -->
                            <div class="flex items-center justify-center gap-0.5 sm:gap-1 flex-1 min-w-0">
                                <input type="number" min="0.01" step="0.01" value="${art.cantidad}" onchange="actualizarValores('${art.id}', 'cantidad', this.value)"
                                    class="w-10 sm:w-14 px-0.5 py-1 text-center text-[11px] sm:text-xs border rounded bg-white focus:ring-1 outline-none ${art.isComprado ? 'opacity-70' : ''}">
                                <span class="text-[10px] sm:text-xs font-medium text-gray-400 shrink-0">x$</span>
                                <input type="number" min="0" step="0.01" value="${art.precioUnitario}" onchange="actualizarValores('${art.id}', 'precio', this.value)"
                                    class="w-12 sm:w-16 px-0.5 py-1 text-center text-[11px] sm:text-xs border rounded bg-white focus:ring-1 outline-none ${art.isComprado ? 'opacity-70' : ''}">
                            </div>
                            
                            <!-- Subtotal (Derecha) -->
                            <span class="font-bold text-gray-900 text-[13px] sm:text-sm text-right shrink-0 min-w-[55px] sm:min-w-[65px]">$ ${formateadorMoneda.format(subtotal)}</span>
                        </div>
                    `;
                    ul.appendChild(li);
                });
                
                ulWrapper.appendChild(ul);
                grupoDiv.appendChild(ulWrapper);
                itemList.appendChild(grupoDiv);
            }
        }

        inicializar();
    </script>
</body>
</html>
